<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Untitled Document</title>
<script type="text/javascript">
function MM_jumpMenu(targ,selObj,restore){ //v3.0
  eval(targ+".location='"+selObj.options[selObj.selectedIndex].value+"'");
  if (restore) selObj.selectedIndex=0;
}
</script>
</head>

<body>
<p>Đăng ký du lịch
</p>
<form action="" method="post" enctype="multipart/form-data" name="form1" id="form1">
  <table width="800" border="1">
    <tr>
      <td width="146">Họ và tên </td>
      <td width="638"><label for="textfield"></label>
      <input type="text" name="textfield" id="textfield" /></td>
    </tr>
    <tr>
      <td>Địa chỉ</td>
      <td><label for="textfield2"></label>
      <input type="text" name="textfield2" id="textfield2" /></td>
    </tr>
    <tr>
      <td>Điện thoại</td>
      <td><label for="textfield3"></label>
      <input type="text" name="textfield3" id="textfield3" /></td>
    </tr>
    <tr>
      <td>Khách Việt Nam</td>
      <td><input type="checkbox" name="checkbox" id="checkbox" />
      <label for="checkbox"></label></td>
    </tr>
    <tr>
      <td>Chon tour</td>
      <td><select name="jumpMenu" id="jumpMenu" onchange="MM_jumpMenu('parent',this,0)">
        <option selected="selected">Chọn tuor</option>
        <option>Mèo Vạc - Hà Giang</option>
      </select></td>
    </tr>
    <tr>
      <td>Phương tiện</td>
      <td><input type="radio" name="radio" id="radio" value="radio" />
        Máy bay 
        <input type="radio" name="radio2" id="radio2" value="radio2" />
        Ô tô 
        <input type="radio" name="radio3" id="radio3" value="radio3" />
        Mô tô</td>
    </tr>
    <tr>
      <td height="81" colspan="2"><div align="center">
        <fieldset>
          <legend>Số lượng đoàn khách</legend>
          <p>Người lơn
            <label for="textfield4"></label>
            <input type="text" name="textfield4" id="textfield4" />
          Trẻ em
          <label>
            <input type="text" name="textfield5" id="textfield5" />
          </label>
          </p>
        </fieldset>
      </div></td>
    </tr>
    <tr>
      <td height="66">Ghi chú thêm</td>
      <td>&nbsp;</td>
    </tr>
    <tr>
      <td colspan="2"><div align="center">
        <input type="submit" name="button" id="button" value="Đồng ý" />
      </div></td>
    </tr>
    <tr>
      <td colspan="2">&nbsp;</td>
    </tr>
  </table>
</form>
<p>&nbsp;</p>

<p>&nbsp;</p>
</body>
</html>
