<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUANHPCSTAR</title>

<style>
:root{--red:#d70018;--bg:#f5f5f5;--text:#222}
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:var(--bg);color:var(--text)}

/* HEADER */
.header{background:var(--red);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.logo{font-weight:700;font-size:20px}
.search{flex:1}
.search input{width:100%;padding:8px;border:none;border-radius:6px}
.cart-btn{background:#fff;color:var(--red);border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:600}

/* BANNER */
.banner{margin:12px 16px;border-radius:12px;background:linear-gradient(90deg,#ff3b3b,#ff8a00);color:#fff;padding:18px;display:flex;justify-content:space-between;align-items:center}
.banner b{font-size:22px}
.banner small{opacity:.9}

/* FILTER */
.filters{display:flex;gap:8px;padding:0 16px 8px;overflow:auto}
.filters button{background:#fff;border:1px solid #eee;padding:6px 10px;border-radius:999px;cursor:pointer}
.filters button.active{border-color:var(--red);color:var(--red)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;padding:12px 16px}
.card{background:#fff;border-radius:12px;padding:10px;box-shadow:0 2px 6px rgba(0,0,0,.08);position:relative;transition:.15s}
.card:hover{transform:translateY(-2px)}
.badge{position:absolute;top:8px;left:8px;background:var(--red);color:#fff;font-size:12px;padding:2px 6px;border-radius:6px}
.img{height:120px;background:#fafafa;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.img img{max-width:100%;max-height:100%}
.title{font-size:14px;min-height:38px}
.price{color:var(--red);font-weight:700}
.old{font-size:12px;color:#888;text-decoration:line-through}
.meta{font-size:12px;color:#666}
.actions{display:flex;gap:6px;margin-top:8px}
.btn{flex:1;border:none;border-radius:8px;padding:6px;cursor:pointer}
.btn.add{background:var(--red);color:#fff}
.btn.buy{background:#fff;border:1px solid var(--red);color:var(--red)}

/* CART */
.cart{position:fixed;right:-360px;top:0;width:340px;height:100%;background:#fff;box-shadow:-2px 0 8px rgba(0,0,0,.15);padding:12px;transition:.25s;display:flex;flex-direction:column}
.cart.open{right:0}
.cart h3{margin:6px 0 10px}
.cart-items{flex:1;overflow:auto}
.cart-item{display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid #eee;padding:6px 0}
.qty{display:flex;gap:4px;align-items:center}
.qty button{width:22px;height:22px;border:none;border-radius:4px;background:#eee;cursor:pointer}
.total{font-weight:700;margin:8px 0}
.checkout input{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;margin-bottom:6px}
.checkout button{width:100%;padding:8px;border:none;border-radius:8px;background:var(--red);color:#fff;cursor:pointer}

/* FOOTER */
.footer{background:#222;color:#fff;margin-top:12px;padding:14px;text-align:center}

</style>
</head>
<body>

<div class="header">
  <div class="logo">TUANHPCSTAR</div>
  <div class="search"><input id="search" placeholder="Bạn cần tìm gì?"></div>
  <button class="cart-btn" onclick="toggleCart()">🛒 (<span id="cart-count">0</span>)</button>
</div>

<div class="banner">
  <div>
    <b>Siêu Sale Linh Kiện</b><br>
    <small>Giảm tới 40% hôm nay</small>
  </div>
  <div>🔥</div>
</div>

<div class="filters" id="filters"></div>

<div class="grid" id="grid"></div>

<div class="cart" id="cart">
  <h3>Giỏ hàng</h3>
  <div class="cart-items" id="cart-items"></div>
  <div class="total">Tổng: <span id="total">0đ</span></div>
  <div class="checkout">
    <input id="name" placeholder="Họ tên">
    <input id="phone" placeholder="SĐT">
    <input id="address" placeholder="Địa chỉ giao hàng">
    <button onclick="checkout()">Thanh toán</button>
  </div>
</div>

<div class="footer">© 2026 TUANHPCSTAR - Demo đồ án</div>

<script>
const CATS=["Tất cả","RAM","SSD","Phụ kiện","Laptop"];
const products=[
  // RAM
  {id:1,cat:"RAM",name:"RAM Kingston 8GB DDR4",price:590000,old:900000,sold:120,rate:4.8,img:"../image/2488_61y6tujNw0L._SX425_.jpg"},
  {id:2,cat:"RAM",name:"RAM Samsung 16GB DDR4",price:990000,old:1200000,sold:80,rate:4.6,img:"../image/RAM-Samsung-16GB-DDR4-2933MHz-ECC-Registered-Giá-Tốt.jpg"},

  // SSD
  {id:3,cat:"SSD",name:"SSD NVMe 1TB Gen3",price:1390000,old:2000000,sold:200,rate:4.9,img:"../image/ssd-crucial-p3-500gb-nvme-3d-nand-m-2-pcie-gen3-x4-ct500p3ssd8-20946615-9fbc-4047-bb55-6b48b29dc9f8-3883f2db-31c8-40c8-8931-ac2a787c7840-a3aee89c-0ba8-4104-b936-3dfcb87514dd.webp"},
  {id:4,cat:"SSD",name:"SSD 512GB KINGSTON",price:700000,old:900000,sold:150,rate:4.5,img:"../image/31260_kc600_512.jpg"},

  // Laptop
  {id:5,cat:"Laptop",name:"Laptop Dell i5 12th",price:15000000,old:17000000,sold:40,rate:4.8,img:"../image/dell-inspiron-15-3520-i5-n5i5011w1-12.jpg"},
  {id:6,cat:"Laptop",name:"Laptop Asus R5",price:18000000,old:20000000,sold:30,rate:4.7,img:"../image/asus-vivobook-go-e1504fa-r5-7520u-bq1160w-thumb-638966564562227379-600x600.jpg"},

  // Phụ kiện PC
  {id:7,cat:"Phụ kiện",name:"Chuột Gaming RGB",price:200000,old:300000,sold:300,rate:4.7,img:"../image/3_1743148956.png"},
  {id:8,cat:"Phụ kiện",name:"Bàn phím cơ 87 phím",price:500000,old:650000,sold:210,rate:4.6,img:"../image/__-09_215f6460268b407fb44435e32fc791f7_1024x1024.jpg"},

  // Điện tử khác
  {id:9,cat:"Phụ kiện",name:"Tai nghe Bluetooth",price:350000,old:500000,sold:500,rate:4.7,img:"../image/tai-nghe-bluetooth-chup-tai-jbl-tune-520bt-thumb-2-600x600.jpg"},
  {id:10,cat:"Phụ kiện",name:"Loa mini",price:250000,old:400000,sold:350,rate:4.5,img:"../image/loa-bluetooth-xiaomi-sound-outdoor-111124-114517-879-600x600.jpg"},
  {id:11,cat:"Phụ kiện",name:"Sạc dự phòng 20000mAh",price:400000,old:600000,sold:600,rate:4.8,img:"../image/pin-sac-du-phong-polymer-20000mah-10-5w-ava-plus-q7-thumb-600x600.jpg"},
  {id:12,cat:"Phụ kiện",name:"Cáp sạc Type-C",price:50000,old:100000,sold:1000,rate:4.6,img:"../image/sactypeC.webp"},

  // Linh kiện điện tử
  {id:13,cat:"Phụ kiện",name:"Arduino Uno R3",price:120000,old:180000,sold:150,rate:4.7,img:"../image/Arduino Uno R3.webp"},
  {id:14,cat:"Phụ kiện",name:"Module cảm biến nhiệt độ",price:30000,old:50000,sold:200,rate:4.5,img:"../image/Module cảm biến nhiệt độ.jpg"},
  {id:15,cat:"Phụ kiện",name:"Nguồn Adapter 12V",price:80000,old:120000,sold:180,rate:4.6,img:"../image/Nguồn Adapter 12V.webp"},
  {id:16,cat:"Phụ kiện",name:"Mạch sạc pin 18650",price:20000,old:40000,sold:220,rate:4.4,img:"../image/Mạch sạc pin 18650.jpg"}
];

let state={cat:"Tất cả",q:""};
let cart=JSON.parse(localStorage.getItem('cart')||'[]');

function money(v){return v.toLocaleString()+"đ"}

function renderFilters(){
  const el=document.getElementById('filters'); el.innerHTML='';
  CATS.forEach(c=>{
    const b=document.createElement('button'); b.textContent=c; if(c===state.cat) b.classList.add('active');
    b.onclick=()=>{state.cat=c; renderAll()};
    el.appendChild(b);
  })
}

function list(){
  return products.filter(p=> (state.cat==="Tất cả"||p.cat===state.cat) && p.name.toLowerCase().includes(state.q));
}

function card(p){
  const off=Math.round(100 - (p.price/p.old*100));
  return `
  <div class="card">
    <div class="badge">-${off}%</div>
    <div class="img"><img src="${p.img}"></div>
    <div class="title">${p.name}</div>
    <div class="price">${money(p.price)} <span class="old">${money(p.old)}</span></div>
    <div class="meta">⭐ ${p.rate} • Đã bán ${p.sold}</div>
    <div class="actions">
      <button class="btn add" onclick="add(${p.id})">Thêm</button>
      <button class="btn buy" onclick="buyNow(${p.id})">Mua</button>
    </div>
  </div>`
}

function renderGrid(){
  const el=document.getElementById('grid'); el.innerHTML='';
  list().forEach(p=> el.innerHTML += card(p));
}

function add(id){
  const p=products.find(x=>x.id===id);
  const i=cart.findIndex(x=>x.id===id);
  if(i>-1) cart[i].qty++; else cart.push({...p,qty:1});
  save();
}

function buyNow(id){ add(id); openCart(); }

function save(){
  localStorage.setItem('cart',JSON.stringify(cart));
  document.getElementById('cart-count').textContent = cart.reduce((a,b)=>a+b.qty,0);
}

function toggleCart(){ document.getElementById('cart').classList.toggle('open'); renderCart(); }
function openCart(){ document.getElementById('cart').classList.add('open'); renderCart(); }

function renderCart(){
  const el=document.getElementById('cart-items'); el.innerHTML='';
  let sum=0;
  cart.forEach((it,idx)=>{
    sum += it.price*it.qty;
    el.innerHTML += `
      <div class="cart-item">
        <div>
          <div>${it.name}</div>
          <div class="meta">${money(it.price)}</div>
        </div>
        <div class="qty">
          <button onclick="dec(${idx})">-</button>
          <span>${it.qty}</span>
          <button onclick="inc(${idx})">+</button>
        </div>
      </div>`
  })
  document.getElementById('total').textContent = money(sum);
}

function inc(i){ cart[i].qty++; save(); renderCart(); }
function dec(i){ cart[i].qty--; if(cart[i].qty<=0) cart.splice(i,1); save(); renderCart(); }

function checkout(){
  const name=document.getElementById('name').value.trim();
  const phone=document.getElementById('phone').value.trim();
  const address=document.getElementById('address').value.trim();
  if(!name||!phone||!address) return alert('Vui lòng nhập đủ thông tin');
  if(cart.length===0) return alert('Giỏ hàng trống');

  // Hiển thị QR thanh toán
  showQR();
}

function showQR(){
  const qrHTML = `
    <div id="qrBox" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;justify-content:center;align-items:center;">
      <div style="background:#fff;padding:20px;border-radius:10px;text-align:center;">
        <h3>Quét mã để thanh toán</h3>
        <img src="../image/IMG_0273.jpg" style="width:220px;height:220px;object-fit:contain"><br><br>
        <button onclick="closeQR()">Đã thanh toán</button>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', qrHTML);
}

function closeQR(){
  const qr=document.getElementById('qrBox');
  if(qr) qr.remove();
  alert('Thanh toán thành công!');
  cart=[];
  save();
  renderCart();
}

// search
const searchEl=document.getElementById('search');
searchEl.addEventListener('input', e=>{ state.q = e.target.value.toLowerCase(); renderGrid(); });

function renderAll(){ renderFilters(); renderGrid(); save(); }
renderAll();
</script>

</body>
</html>
